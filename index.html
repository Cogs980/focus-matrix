<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Focus Matrix</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: rgba(255,255,255,0.08);
    --text: #f0ede8;
    --muted: rgba(240,237,232,0.45);
    --faint: rgba(240,237,232,0.12);

    --q1: #ff6b4a;
    --q1-bg: rgba(255,107,74,0.08);
    --q1-border: rgba(255,107,74,0.25);

    --q2: #4a9eff;
    --q2-bg: rgba(74,158,255,0.08);
    --q2-border: rgba(74,158,255,0.25);

    --q3: #f5c842;
    --q3-bg: rgba(245,200,66,0.07);
    --q3-border: rgba(245,200,66,0.22);

    --q4: #888;
    --q4-bg: rgba(136,136,136,0.06);
    --q4-border: rgba(136,136,136,0.18);

    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', system-ui, sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .logo {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 26px;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .logo span {
    color: var(--q1);
  }

  .stats {
    display: flex;
    gap: 20px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .stat strong {
    color: var(--text);
    font-weight: 500;
    font-size: 15px;
    display: block;
    line-height: 1.2;
  }

  .add-bar {
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .add-bar input[type="text"] {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    font-weight: 300;
    padding: 9px 14px;
    border-radius: var(--radius-sm);
    outline: none;
    transition: border-color 0.2s;
  }

  .add-bar input[type="text"]:focus {
    border-color: rgba(255,255,255,0.22);
  }

  .add-bar input[type="text"]::placeholder {
    color: var(--muted);
  }

  .tag-btn {
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: inherit;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .tag-btn.active { color: var(--text); }
  .tag-btn.u-on.active  { border-color: var(--q1); color: var(--q1); background: var(--q1-bg); }
  .tag-btn.u-off.active { border-color: var(--q2); color: var(--q2); background: var(--q2-bg); }
  .tag-btn.i-on.active  { border-color: var(--q1); color: var(--q1); background: var(--q1-bg); }
  .tag-btn.i-off.active { border-color: var(--q4); color: var(--q4); background: var(--q4-bg); }

  .add-btn {
    padding: 9px 20px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--text);
    color: #0f0f0f;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  .add-btn:hover { opacity: 0.88; }
  .add-btn:active { transform: scale(0.97); }

  .axis-wrapper {
    flex: 1;
    display: grid;
    grid-template-columns: 24px 1fr;
    grid-template-rows: 1fr 24px;
    padding: 16px 32px 16px 8px;
    gap: 0;
    min-height: 0;
  }

  .axis-y {
    grid-column: 1;
    grid-row: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .axis-y-label {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .axis-x {
    grid-column: 2;
    grid-row: 2;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0 4px;
    margin-top: 6px;
  }

  .matrix {
    grid-column: 2;
    grid-row: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 10px;
  }

  .quadrant {
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 200px;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  .quadrant.drag-over {
    border-color: rgba(255,255,255,0.3);
    background: var(--surface2);
  }

  .q1 { border-color: var(--q1-border); }
  .q2 { border-color: var(--q2-border); }
  .q3 { border-color: var(--q3-border); }
  .q4 { border-color: var(--q4-border); }

  .q-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .q-label {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .q-name {
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .q-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .q1 .q-dot { background: var(--q1); }
  .q2 .q-dot { background: var(--q2); }
  .q3 .q-dot { background: var(--q3); }
  .q4 .q-dot { background: var(--q4); }

  .q1 .q-name { color: var(--q1); }
  .q2 .q-name { color: var(--q2); }
  .q3 .q-name { color: var(--q3); }
  .q4 .q-name { color: var(--q4); }

  .q-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.03em;
  }

  .q-count {
    font-size: 11px;
    color: var(--muted);
    background: var(--faint);
    border-radius: 20px;
    padding: 2px 8px;
    flex-shrink: 0;
  }

  .tasks {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    overflow-y: auto;
  }

  .tasks::-webkit-scrollbar { width: 3px; }
  .tasks::-webkit-scrollbar-track { background: transparent; }
  .tasks::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  .task {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: grab;
    transition: all 0.15s;
    animation: taskIn 0.2s ease;
    position: relative;
  }

  @keyframes taskIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .task:hover { border-color: rgba(255,255,255,0.16); background: #2a2a2a; }
  .task.dragging { opacity: 0.4; cursor: grabbing; }
  .task.done .task-text { text-decoration: line-through; opacity: 0.4; }

  .task-check {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }

  .task-check:hover { border-color: rgba(255,255,255,0.3); }

  .task.done .task-check {
    background: var(--faint);
    border-color: rgba(255,255,255,0.2);
  }

  .task.done .task-check::after {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
  }

  .task-text {
    flex: 1;
    line-height: 1.4;
    color: var(--text);
    font-weight: 300;
  }

  .task-del {
    opacity: 0;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 2px;
    transition: opacity 0.15s, color 0.15s;
    flex-shrink: 0;
  }

  .task:hover .task-del { opacity: 1; }
  .task-del:hover { color: #ff6b6b; }

  .empty {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    padding: 8px 0;
    opacity: 0.7;
  }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--text);
    color: #0f0f0f;
    padding: 9px 20px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s;
    z-index: 100;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    header, .add-bar { padding: 16px; }
    .axis-wrapper { padding: 10px 16px 10px 4px; }
    .matrix { grid-template-columns: 1fr; grid-template-rows: repeat(4, auto); }
    .axis-y, .axis-x { display: none; }
    .axis-wrapper { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Focus<span>.</span> Matrix</div>
  <div class="stats">
    <div class="stat"><strong id="stat-total">0</strong> total</div>
    <div class="stat"><strong id="stat-done">0</strong> done</div>
    <div class="stat"><strong id="stat-do">0</strong> do first</div>
  </div>
</header>

<div class="add-bar">
  <input type="text" id="task-input" placeholder="Add a task…" />
  <button class="tag-btn u-on active" id="btn-urgent" onclick="toggleUrgent()">Urgent</button>
  <button class="tag-btn i-on active" id="btn-important" onclick="toggleImportant()">Important</button>
  <button class="add-btn" onclick="addTask()">+ Add</button>
</div>

<div class="axis-wrapper">
  <div class="axis-y">
    <span>Important</span>
    <div class="axis-y-label">importance</div>
    <span>Not important</span>
  </div>

  <div class="matrix">
    <div class="quadrant q2" id="drop-q2" ondragover="onDragOver(event,'q2')" ondragleave="onDragLeave('q2')" ondrop="onDrop(event,'q2')">
      <div class="q-head">
        <div class="q-label">
          <div class="q-name"><span class="q-dot"></span> Schedule</div>
          <div class="q-sub">not urgent · important</div>
        </div>
        <span class="q-count" id="count-q2">0</span>
      </div>
      <div class="tasks" id="list-q2"></div>
    </div>

    <div class="quadrant q1" id="drop-q1" ondragover="onDragOver(event,'q1')" ondragleave="onDragLeave('q1')" ondrop="onDrop(event,'q1')">
      <div class="q-head">
        <div class="q-label">
          <div class="q-name"><span class="q-dot"></span> Do first</div>
          <div class="q-sub">urgent · important</div>
        </div>
        <span class="q-count" id="count-q1">0</span>
      </div>
      <div class="tasks" id="list-q1"></div>
    </div>

    <div class="quadrant q4" id="drop-q4" ondragover="onDragOver(event,'q4')" ondragleave="onDragLeave('q4')" ondrop="onDrop(event,'q4')">
      <div class="q-head">
        <div class="q-label">
          <div class="q-name"><span class="q-dot"></span> Eliminate</div>
          <div class="q-sub">not urgent · not important</div>
        </div>
        <span class="q-count" id="count-q4">0</span>
      </div>
      <div class="tasks" id="list-q4"></div>
    </div>

    <div class="quadrant q3" id="drop-q3" ondragover="onDragOver(event,'q3')" ondragleave="onDragLeave('q3')" ondrop="onDrop(event,'q3')">
      <div class="q-head">
        <div class="q-label">
          <div class="q-name"><span class="q-dot"></span> Delegate</div>
          <div class="q-sub">urgent · not important</div>
        </div>
        <span class="q-count" id="count-q3">0</span>
      </div>
      <div class="tasks" id="list-q3"></div>
    </div>
  </div>

  <div class="axis-x">
    <span>Not urgent</span>
    <span>urgency</span>
    <span>Urgent</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let tasks = { q1: [], q2: [], q3: [], q4: [] };
let isUrgent = true, isImportant = true;
let dragId = null, dragFrom = null;

function getQ(u, i) {
  if (u && i) return 'q1';
  if (!u && i) return 'q2';
  if (u && !i) return 'q3';
  return 'q4';
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

async function load() {
  try {
    const r = await window.storage.get('focus-matrix-tasks');
    if (r && r.value) tasks = JSON.parse(r.value);
  } catch(e) {}
  render();
}

async function save() {
  try { await window.storage.set('focus-matrix-tasks', JSON.stringify(tasks)); } catch(e) {}
}

function toggleUrgent() {
  isUrgent = !isUrgent;
  const btn = document.getElementById('btn-urgent');
  btn.textContent = isUrgent ? 'Urgent' : 'Not urgent';
  btn.className = 'tag-btn active ' + (isUrgent ? 'u-on' : 'u-off');
}

function toggleImportant() {
  isImportant = !isImportant;
  const btn = document.getElementById('btn-important');
  btn.textContent = isImportant ? 'Important' : 'Not important';
  btn.className = 'tag-btn active ' + (isImportant ? 'i-on' : 'i-off');
}

function addTask() {
  const inp = document.getElementById('task-input');
  const text = inp.value.trim();
  if (!text) { inp.focus(); return; }
  const q = getQ(isUrgent, isImportant);
  tasks[q].push({ id: uid(), text, done: false });
  inp.value = '';
  inp.focus();
  save();
  render();
  showToast('Task added to ' + qName(q));
}

function qName(q) {
  return { q1: 'Do first', q2: 'Schedule', q3: 'Delegate', q4: 'Eliminate' }[q];
}

function toggleDone(q, id) {
  const t = tasks[q].find(x => x.id === id);
  if (t) { t.done = !t.done; save(); render(); }
}

function removeTask(q, id) {
  tasks[q] = tasks[q].filter(x => x.id !== id);
  save(); render();
}

function onDragStart(e, q, id) {
  dragId = id; dragFrom = q;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) el.classList.add('dragging');
  }, 0);
}

function onDragEnd(e) {
  document.querySelectorAll('.task').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.quadrant').forEach(el => el.classList.remove('drag-over'));
}

function onDragOver(e, q) {
  e.preventDefault();
  document.getElementById('drop-' + q).classList.add('drag-over');
}

function onDragLeave(q) {
  document.getElementById('drop-' + q).classList.remove('drag-over');
}

function onDrop(e, q) {
  e.preventDefault();
  document.getElementById('drop-' + q).classList.remove('drag-over');
  if (!dragId || !dragFrom || dragFrom === q) return;
  const t = tasks[dragFrom].find(x => x.id === dragId);
  if (!t) return;
  tasks[dragFrom] = tasks[dragFrom].filter(x => x.id !== dragId);
  tasks[q].push(t);
  dragId = null; dragFrom = null;
  save(); render();
  showToast('Moved to ' + qName(q));
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2000);
}

function render() {
  const qs = ['q1','q2','q3','q4'];
  let total = 0, done = 0;

  qs.forEach(q => {
    const list = document.getElementById('list-' + q);
    const count = document.getElementById('count-' + q);
    list.innerHTML = '';

    if (tasks[q].length === 0) {
      const e = document.createElement('div');
      e.className = 'empty';
      e.textContent = 'No tasks here';
      list.appendChild(e);
    } else {
      tasks[q].forEach(t => {
        total++;
        if (t.done) done++;
        const el = document.createElement('div');
        el.className = 'task' + (t.done ? ' done' : '');
        el.setAttribute('draggable', 'true');
        el.setAttribute('data-id', t.id);
        el.ondragstart = e => onDragStart(e, q, t.id);
        el.ondragend = onDragEnd;

        const chk = document.createElement('div');
        chk.className = 'task-check';
        chk.onclick = () => toggleDone(q, t.id);

        const txt = document.createElement('span');
        txt.className = 'task-text';
        txt.textContent = t.text;

        const del = document.createElement('button');
        del.className = 'task-del';
        del.textContent = '×';
        del.onclick = () => removeTask(q, t.id);

        el.appendChild(chk);
        el.appendChild(txt);
        el.appendChild(del);
        list.appendChild(el);
      });
    }

    count.textContent = tasks[q].length;
  });

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-do').textContent = tasks.q1.length;
}

document.getElementById('task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

load();
</script>
</body>
</html>
